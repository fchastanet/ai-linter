---
# - Level of verbose logging. 0 is standard, higher numbers are more verbose
# - overridden by passing --verbose / -v
# - default = 0
verbose: 0

# - Remove cached HTTP responses older than cacheTtl seconds old.
#   Specifying 0 clears and disables cache completely
# - overridden by passing --cache-ttl
# - default = 600
cacheTtl: 86400

customCatalog:
  schemas:
    - name: pre-commit
      description: pre-commit
      fileMatch: [".pre-commit-config*.yml", ".pre-commit-config*.yaml"]
      location: https://json.schemastore.org/pre-commit-config.json
    - name: dependabot
      description: dependabot
      fileMatch: [".github/dependabot.yml"]
      location: https://www.schemastore.org/dependabot-2.0.json
    - name: ai-linter schema
      description: AI Linter Configuration Schema
      fileMatch: [".ai-linter-config.json-schema.json"]
      location: https://json-schema.org/draft/2020-12/schema
    - name: ai-linter config
      description: AI Linter Configuration
      fileMatch: [".ai-linter-config*.yml", ".ai-linter-config*.yaml"]
      location: |
        https://raw.githubusercontent.com/fchastanet/ai-linter/refs/heads/master/.ai-linter-config.json-schema.json
