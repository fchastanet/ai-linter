---
name: CI/CD

"on":
  workflow_dispatch:
  push:
    branches:
      - master
      - develop
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
  pull_request:
    branches:
      - master
  release:
    types:
      - published

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      statuses: write  # needed by ouzi-dev/commit-status-updater@v2

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: tibdex/github-app-token@v2
        if: ${{ success() }}
        id: generate-token
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: ouzi-dev/commit-status-updater@v2
        with:
          name: lint
          status: pending

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1
        id: preCommit
        with:
          extra_args: >-
            -c .pre-commit-config.yaml -a

      - uses: ouzi-dev/commit-status-updater@v2
        with:
          name: lint
          status: ${{ job.status }}

      - name: Create Pull Request
        id: cpr
        if: >
          (
            github.event_name == 'push' ||
            github.event.pull_request.head.repo.full_name ==
            github.repository
          )
          && steps.preCommit.conclusion == 'failure'
          && !contains(github.event.head_commit.message, 'skip fix')
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ steps.generate-token.outputs.token }}
          committer: fchastanet <fchastanet@gmail.com>
          branch: update/pre-commit-fixes-${{ env.branch_name }}
          delete-branch: true
          title: lint fixes
          commit-message: Auto-update lint fixes
          body: |
            some auto fixes have been generated during pre-commit run
          labels: pre-commit-fixes

      - name: Print Pull request created
        if: |
          steps.cpr.outputs.pull-request-number &&
          steps.cpr.conclusion == 'success'
        run: |
          echo "Pull Request Number - ${{ steps.cpr.outputs.pull-request-number }}"
          echo "Pull Request URL - ${{ steps.cpr.outputs.pull-request-url }}"

  test:
    runs-on: ubuntu-latest
    needs:
      - lint
    strategy:
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
    permissions:
      # needed by ouzi-dev/commit-status-updater@v2
      statuses: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          make install
          make install-dev

      - uses: ouzi-dev/commit-status-updater@v2
        with:
          name: test-python-${{ matrix.python-version }}
          status: pending

      - name: Test
        run: |
          make test-all

      - name: Upload coverage reports to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Publish coverage report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: code-coverage-${{ github.job }}-${{ github.run_number }}-${{ matrix.python-version }}
          path: |
            .coverage
            coverage.xml
            htmlcov/
          include-hidden-files: true
          if-no-files-found: ignore

      - uses: ouzi-dev/commit-status-updater@v2
        with:
          name: test-python-${{ matrix.python-version }}
          status: ${{ job.status }}

  build:
    needs:
      - test
      - lint
    permissions:
      contents: write  # needed by svenstaro/upload-release-action and ncipollo/release-action
    environment: Python
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'release' ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/'))

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build package
        run: make build

      - name: Check build
        run: twine check dist/*

      - name: Generate changelog
        id: changelog
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref_name }}
          allowUpdates: true
          generateReleaseNotes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

      - name: Upload wheel to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file:
            dist/ai_linter-${{ github.ref_name }}-py3-none-any.whl
          tag: ${{ github.ref }}
          overwrite: true
          asset_name: ai_linter-${{ github.ref_name }}-py3.12.whl

      - name: Publish to PyPI
        if: github.event_name == 'release'
        continue-on-error: true
        env:
          TWINE_USERNAME: ${{ vars.PYPI_USERNAME }}
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: twine upload dist/* --verbose --non-interactive --skip-existing
